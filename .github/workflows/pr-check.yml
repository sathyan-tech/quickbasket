name: PR Check & Comment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          node --check js/app.js && echo "✅ app.js OK"
          node --check js/data.js && echo "✅ data.js OK"
          node --check js/firebase.js && echo "✅ firebase.js OK"

      - name: Count products
        id: count
        run: |
          COUNT=$(grep -c "id:'" js/data.js || echo "unknown")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.count.outputs.count }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ QuickBasket PR Check Passed\n\n- **JS syntax**: All files valid\n- **Products in catalogue**: ${count}\n- **Deploy**: Will go live at https://sathyan-tech.github.io/quickbasket after merge\n\n> Auto-deployed via GitHub Actions on merge to main`
            });
