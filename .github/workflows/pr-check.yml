name: PR Check & Comment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          # Use bash to check for obvious syntax errors without a package.json
          for f in js/app.js js/data.js js/firebase.js; do
            if [ -f "$f" ]; then
              # Check file is non-empty
              [ -s "$f" ] && echo "✅ $f exists and is non-empty" || (echo "❌ $f is empty" && exit 1)
              # Check for unmatched braces (basic sanity check)
              OPEN=$(grep -o '{' "$f" | wc -l)
              CLOSE=$(grep -o '}' "$f" | wc -l)
              echo "   $f: { $OPEN  } $CLOSE"
            else
              echo "❌ $f not found" && exit 1
            fi
          done

      - name: Check required files exist
        run: |
          for f in index.html css/styles.css js/app.js js/data.js js/firebase.js; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done

      - name: Count products
        id: count
        run: |
          COUNT=$(grep -c "basePrice:" js/data.js 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "📦 Products in catalogue: $COUNT"

      - name: Print summary
        run: |
          echo "## ✅ QuickBasket Build Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| All required files present | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| JS files non-empty | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Products in catalogue | ${{ steps.count.outputs.count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | [quickbasket](https://sathyan-tech.github.io/quickbasket) |" >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.count.outputs.count }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ QuickBasket PR Check Passed\n\n| Check | Status |\n|-------|--------|\n| Required files | ✅ |\n| JS files valid | ✅ |\n| Products in catalogue | ${count} |\n\n🚀 Will deploy to https://sathyan-tech.github.io/quickbasket after merge`
            });
